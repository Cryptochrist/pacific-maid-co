name: Deploy site to GitHub Pages

# Publishes the contents of /site to GitHub Pages on every push to main.
# Source must be set to "GitHub Actions" under Settings → Pages.

on:
  push:
    branches: [main]
  workflow_dispatch: {}   # allows manual runs from the Actions tab

# Permissions the deploy needs
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deploy; don't cancel an in-progress run mid-publish
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site        # the folder that contains index.html

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
